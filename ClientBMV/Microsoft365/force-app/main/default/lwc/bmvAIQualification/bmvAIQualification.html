<template>
    <div class="ai-card-wrapper">

        <!-- Header -->
        <div class="ai-header">
            <div class="ai-header-left">
                <div class="ai-brain-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.5 2 6 4.5 6 7.5C6 8.2 6.1 8.9 6.4 9.5C5 10.2 4 11.7 4 13.5C4 15.8 5.6 17.7 7.7 18.3C8.2 19.8 9.5 21 11.1 21.3V22H12.9V21.3C14.5 21 15.8 19.8 16.3 18.3C18.4 17.7 20 15.8 20 13.5C20 11.7 19 10.2 17.6 9.5C17.9 8.9 18 8.2 18 7.5C18 4.5 15.5 2 12 2Z" fill="url(#brainGrad)"/>
                        <circle cx="9.5" cy="8.5" r="1" fill="white" opacity="0.8"/>
                        <circle cx="14.5" cy="8.5" r="1" fill="white" opacity="0.8"/>
                        <path d="M9 12C9 12 10 14 12 14C14 14 15 12 15 12" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
                        <defs>
                            <linearGradient id="brainGrad" x1="4" y1="2" x2="20" y2="22" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#A78BFA"/>
                                <stop offset="100%" stop-color="#6366F1"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="ai-header-text">
                    <span class="ai-label">Einstein AI Analysis</span>
                    <span class="ai-sublabel">BMV Lead Qualification</span>
                </div>
            </div>
            <div class="ai-badge-wrapper">
                <template if:true={isHot}>
                    <div class="tier-badge tier-hot">
                        <span class="tier-dot"></span>
                        <span>HOT</span>
                    </div>
                </template>
                <template if:true={isWarm}>
                    <div class="tier-badge tier-warm">
                        <span class="tier-dot"></span>
                        <span>WARM</span>
                    </div>
                </template>
                <template if:true={isCold}>
                    <div class="tier-badge tier-cold">
                        <span class="tier-dot"></span>
                        <span>COLD</span>
                    </div>
                </template>
                <template if:true={isDisqualified}>
                    <div class="tier-badge tier-disq">
                        <span class="tier-dot"></span>
                        <span>DISQUALIFIED</span>
                    </div>
                </template>
                <template if:false={hasScore}>
                    <div class="tier-badge tier-none">
                        <span class="tier-dot"></span>
                        <span>NOT SCORED</span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Score Section -->
        <template if:true={hasScore}>
        <div class="score-section">
            <div class="score-left">
                <div class="score-ring-wrapper">
                    <svg class="score-ring" viewBox="0 0 120 120">
                        <circle class="ring-bg" cx="60" cy="60" r="50" 
                                stroke-width="10" fill="none"/>
                        <circle class="ring-fill" cx="60" cy="60" r="50"
                                stroke-width="10" fill="none"
                                stroke-dasharray={scoreDashArray}
                                stroke-dashoffset="0"
                                stroke-linecap="round"/>
                        <text x="60" y="55" text-anchor="middle" 
                              class="score-number">{aiScore}</text>
                        <text x="60" y="72" text-anchor="middle" 
                              class="score-out-of">/ 100</text>
                    </svg>
                </div>
            </div>
            <div class="score-right">
                <div class="score-bar-section">
                    <div class="score-bar-label">
                        <span>Qualification Score</span>
                        <span class="score-pct">{aiScore}%</span>
                    </div>
                    <div class="score-bar-track">
                        <div class="score-bar-fill" style={scoreBarStyle}></div>
                    </div>
                </div>
                <div class="score-breakdown">
                    <div class="breakdown-item">
                        <div class="breakdown-icon investor-icon">
                            <svg viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 8a3 3 0 100-6 3 3 0 000 6zm0 2c-3.3 0-6 1.6-6 3v1h12v-1c0-1.4-2.7-3-6-3z"/>
                            </svg>
                        </div>
                        <div class="breakdown-text">
                            <span class="breakdown-label">Investor Type</span>
                            <span class="breakdown-value">{investorType}</span>
                        </div>
                    </div>
                    <div class="breakdown-item">
                        <div class="breakdown-icon aum-icon">
                            <svg viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm1 10H7V9H5.5l2.5-4 2.5 4H9v2z"/>
                            </svg>
                        </div>
                        <div class="breakdown-text">
                            <span class="breakdown-label">AUM Range</span>
                            <span class="breakdown-value">{aumRange}</span>
                        </div>
                    </div>
                    <div class="breakdown-item">
                        <div class="breakdown-icon mexico-icon">
                            <svg viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 0C5.8 0 4 1.8 4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm0 10c-4.4 0-8 2-8 3v1h16v-1c0-1-3.6-3-8-3z"/>
                            </svg>
                        </div>
                        <div class="breakdown-text">
                            <span class="breakdown-label">Mexico Interest</span>
                            <span class="breakdown-value">{mexicoInterest}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </template>

        <!-- Not Scored State -->
        <template if:false={hasScore}>
        <div class="not-scored-section">
            <div class="not-scored-icon">
                <svg viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4"/>
                    <path d="M24 14v12M24 30v4" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <p class="not-scored-text">
                AI scoring will run automatically after lead creation
            </p>
            <p class="not-scored-sub">
                Ensure Investor Type, AUM Range, and Company are filled
            </p>
        </div>
        </template>

        <!-- Divider -->
        <div class="section-divider"></div>

        <!-- AI Summary -->
        <template if:true={aiSummary}>
        <div class="summary-section">
            <div class="section-header">
                <div class="section-icon summary-icon">
                    <svg viewBox="0 0 16 16" fill="currentColor">
                        <path d="M2 2h12v2H2zm0 4h12v2H2zm0 4h8v2H2z"/>
                    </svg>
                </div>
                <span class="section-title">AI Analysis Summary</span>
            </div>
            <div class="summary-content">
                <div class="quote-mark">"</div>
                <p class="summary-text">{aiSummary}</p>
            </div>
        </div>
        </template>

        <!-- Divider -->
        <template if:true={aiSummary}>
        <div class="section-divider"></div>
        </template>

        <!-- Recommended Action -->
        <template if:true={aiAction}>
        <div class="action-section">
            <div class="section-header">
                <div class="section-icon action-icon">
                    <svg viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 1l2 4 5 .7-3.6 3.5.9 5L8 11.8 3.7 14.2l.9-5L1 5.7 6 5z"/>
                    </svg>
                </div>
                <span class="section-title">Recommended Next Action</span>
            </div>
            <div class="action-content">
                <div class="action-arrow">→</div>
                <span class="action-text">{aiAction}</span>
            </div>
        </div>
        </template>

        <!-- Disqualification Reason -->
        <template if:true={showReason}>
        <div class="section-divider"></div>
        <div class="reason-section">
            <div class="section-header">
                <div class="section-icon reason-icon">
                    <svg viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 3.5h1.5v5h-1.5zm0 6h1.5v1.5h-1.5z"/>
                    </svg>
                </div>
                <span class="section-title">Disqualification Reason</span>
            </div>
            <div class="reason-content">
                <span class="reason-text">{aiReason}</span>
            </div>
        </div>
        </template>

        <!-- Footer -->
        <div class="ai-footer">
            <div class="footer-left">
                <svg class="einstein-logo" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="9" fill="#0176D3" opacity="0.15"/>
                    <path d="M10 3C7.2 3 5 5.2 5 8C5 9.1 5.4 10.1 6 10.9C5.4 11.5 5 12.3 5 13.2C5 14.9 6.3 16.3 8 16.6V17H12V16.6C13.7 16.3 15 14.9 15 13.2C15 12.3 14.6 11.5 14 10.9C14.6 10.1 15 9.1 15 8C15 5.2 12.8 3 10 3Z" fill="#0176D3"/>
                </svg>
                <span class="footer-text">Powered by Einstein AI</span>
            </div>
            <template if:true={lastAnalyzed}>
            <span class="footer-time">Last scored: {formattedDate}</span>
            </template>
        </div>

    </div>
</template>
