<template>
    <lightning-card title="Lead Conversion Preview" icon-name="standard:lead">
        <!-- Spinner -->
        <template if:true={isLoading}>
            <div class="slds-is-relative slds-p-vertical_medium">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Main Content -->
        <template if:true={conversionData}>
            <div class="slds-p-around_large">

                <!-- Account Section -->
                <div class="slds-box slds-theme_default slds-m-bottom_large section-card">
                    <p class="section-title">Account Details</p>
                    <template if:true={accountToInsert}>
                        <div class="slds-grid slds-wrap slds-gutters slds-m-top_small">
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <template if:true={accountToInsert}>
                                    <p>
                                        <strong>Name:</strong>

                                       <template if:true={accountToInsert.Id}>
                                            <span
                                                class="slds-text-link"
                                                data-recordid={accountToInsert.Id}
                                                data-objectapiname="Account"
                                                onclick={handleNavigate}>
                                                {accountToInsert.Name}
                                            </span>
                                        </template>
                                        <template if:false={accountToInsert.Id}>
                                            <span>{accountToInsert.Name}</span>
                                        </template>
                                    </p>
                                </template>

                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>CIN:</strong> <span>{accountToInsert.mfg_CIN__c}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Phone:</strong> <span>{accountToInsert.Phone}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Website:</strong> <span>{accountToInsert.Website}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Account Source:</strong> <span>{accountToInsert.AccountSource}</span></p>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Contact Section -->
                <div class="slds-box slds-theme_default slds-m-bottom_large section-card">
                    <p class="section-title">Contact Details</p>
                    <template if:true={contactToInsert}>
                        <div class="slds-grid slds-wrap slds-gutters slds-m-top_small">
                            <div class="slds-col slds-size_1-of-2 field-col">

                                <template if:true={contactToInsert}>
                                    <p>
                                        <strong>Name:</strong>
                                         <template if:true={contactToInsert.Id}>
                                            <span
                                                class="slds-text-link"
                                                data-recordid={contactToInsert.Id}
                                                data-objectapiname="Contact"
                                                onclick={handleNavigate}>
                                                {contactToInsert.LastName}
                                            </span>
                                        </template>
                                        <template if:false={contactToInsert.Id}>
                                            <span>{contactToInsert.FirstName} {contactToInsert.LastName}</span>
                                        </template>
                                    </p>
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Email:</strong> <span>{contactToInsert.Email}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Phone:</strong> <span>{contactToInsert.Phone}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Lead Source:</strong> <span>{contactToInsert.LeadSource}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Preference:</strong> <span>{contactToInsert.mfg_Communication_Preference__c}</span></p>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Opportunity Section -->
                <div class="slds-box slds-theme_default section-card">
                    <p class="section-title"> Opportunity Details</p>
                    <template if:true={opportunityToInsert}>
                        <div class="slds-grid slds-wrap slds-gutters slds-m-top_small">
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <template if:true={opportunityToInsert}>
                                    <p>
                                        <strong>Name:</strong>
                                        <template if:true={opportunityToInsert.Id}>
                                            <span
                                                class="slds-text-link"
                                                data-recordid={opportunityToInsert.Id}
                                                data-objectapiname="Opportunity"
                                                onclick={handleNavigate}>
                                                {opportunityToInsert.Name}
                                            </span>
                                        </template>
                                        <template if:false={opportunityToInsert.Id}>
                                            <span>{opportunityToInsert.Name}</span>
                                        </template>
                                    </p>
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Product Family:</strong> <span>{opportunityToInsert.mfg_Product_Family__c}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Budget:</strong> <span>{opportunityToInsert.mfg_Expected_Budget__c}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Quantity:</strong> <span>{opportunityToInsert.mfg_EstimatedQuantity__c}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Urgency:</strong> <span>{opportunityToInsert.mfg_Urgency_Level__c}</span></p>
                            </div>
                            <div class="slds-col slds-size_1-of-2 field-col">
                                <p><strong>Planning To Buy:</strong> <span>{opportunityToInsert.mfg_PlanningToBuy__c}</span></p>
                            </div>
                        </div>
                    </template>
                    <template if:false={opportunityToInsert}>
                        <p class="slds-text-color_weak slds-p-top_small">No opportunity created (Dealer Lead)</p>
                    </template>
                </div>

                <!-- Convert Button -->
                <div  if:false={isConverted}  class="slds-align_absolute-center slds-m-top_large"  style="position: sticky; bottom:0">
                    <lightning-button variant="brand" label="Convert Lead" onclick={handleConvert}></lightning-button>
                </div>
            </div>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="slds-p-around_medium slds-text-color_error">{error}</div>
        </template>
    </lightning-card>
</template>
